name: NSE Trading Agent

on:
  schedule:
    - cron: '45 3 * * 1-5'
    - cron: '0,15,30,45 4-9 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    name: Run 15-min scan cycle
    runs-on: ubuntu-latest
    timeout-minutes: 14
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Restore paper state cache
        uses: actions/cache@v4
        with:
          path: logs/paper_state.json
          key: paper-state-${{ github.ref_name }}
          restore-keys: |
            paper-state-

      - name: Seed paper state if missing
        run: |
          mkdir -p logs
          if [ ! -f logs/paper_state.json ]; then
            echo "No cached state found — seeding with real balance"
            cat > logs/paper_state.json << 'SEED'
          {"cash":49862.30940795899,"positions":{},"trade_log":[],"daily_pnl":0.0}
          SEED
            echo "Seeded logs/paper_state.json"
          else
            echo "Cache restored — using existing state"
            cat logs/paper_state.json | python3 -c "import json,sys; s=json.load(sys.stdin); print(f'Cash: ₹{s[\"cash\"]:.2f}, Positions: {len(s[\"positions\"])}, Trades: {len(s[\"trade_log\"])}')"
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading scan
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save paper state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: logs/paper_state.json
          key: paper-state-${{ github.ref_name }}

      - name: Commit updated trade logs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git diff --staged --quiet && exit 0
          git commit -m "chore: update trade logs [skip ci]"
          git push origin master || (git pull --rebase origin master && git push origin master)
